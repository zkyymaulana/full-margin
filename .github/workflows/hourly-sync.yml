name: Hourly Backend Warmup

on:
  schedule:
    - cron: "55 * * * *"
  workflow_dispatch:

jobs:
  warmup-backend:
    runs-on: ubuntu-latest
    steps:
      - name: Ping backend warmup endpoint
        env:
          BACKEND_WAKE_URL: ${{ secrets.BACKEND_CRON_URL }}
          BACKEND_CRON_TOKEN: ${{ secrets.BACKEND_CRON_TOKEN }}
        run: |
          if [ -z "$BACKEND_WAKE_URL" ]; then
            echo "Missing BACKEND_CRON_URL secret (set this to a lightweight endpoint, e.g. https://<host>/api)"
            exit 1
          fi

          echo "Warmup URL: $BACKEND_WAKE_URL"

          for attempt in 1 2 3; do
            echo "Attempt $attempt: Wake backend"

            curl_cmd=(
              curl --silent --show-error
              -o /tmp/warmup_response.json
              -w "%{http_code}" \
              -X GET "$BACKEND_WAKE_URL"
            )

            if [ -n "$BACKEND_CRON_TOKEN" ]; then
              curl_cmd+=( -H "x-cron-token: $BACKEND_CRON_TOKEN" )
            fi

            status=$("${curl_cmd[@]}")

            echo "HTTP status: $status"
            cat /tmp/warmup_response.json || true
            echo

            if [ "$status" -ge 200 ] && [ "$status" -lt 300 ]; then
              echo "Backend warmup ping sent successfully"
              exit 0
            fi

            if [ "$attempt" -lt 3 ]; then
              echo "Request failed. Retrying in 20 seconds..."
              sleep 20
            fi
          done

          echo "Failed to warmup backend after 3 attempts"
          exit 1
