name: Hourly Sync Trigger

on:
  schedule:
    - cron: "15 * * * *"
  workflow_dispatch:

jobs:
  trigger-hourly-sync:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger backend hourly sync
        env:
          BACKEND_CRON_URL: ${{ secrets.BACKEND_CRON_URL }}
          BACKEND_CRON_TOKEN: ${{ secrets.BACKEND_CRON_TOKEN }}
        run: |
          if [ -z "$BACKEND_CRON_URL" ] || [ -z "$BACKEND_CRON_TOKEN" ]; then
            echo "Missing BACKEND_CRON_URL or BACKEND_CRON_TOKEN secret"
            exit 1
          fi

          echo "Trigger URL: $BACKEND_CRON_URL"

          for attempt in 1 2 3; do
            echo "Attempt $attempt: Trigger backend hourly sync"

            status=$(curl --silent --show-error \
              -o /tmp/cron_response.json \
              -w "%{http_code}" \
              -X POST "$BACKEND_CRON_URL" \
              -H "Content-Type: application/json" \
              -H "x-cron-token: $BACKEND_CRON_TOKEN" \
              --data '{"source":"github-actions"}')

            echo "HTTP status: $status"
            cat /tmp/cron_response.json || true
            echo

            if [ "$status" -ge 200 ] && [ "$status" -lt 300 ]; then
              echo "Hourly sync trigger sent successfully"
              exit 0
            fi

            if [ "$attempt" -lt 3 ]; then
              echo "Request failed. Retrying in 20 seconds..."
              sleep 20
            fi
          done

          echo "Failed to trigger hourly sync after 3 attempts"
          exit 1
